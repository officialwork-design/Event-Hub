<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Hub</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">LINE LIFF Event Management</p>
        <h1>Event Hub</h1>
        <p class="lead">オフ会の資料、準備物、経費、当日スケジュールをまとめて管理します。</p>
      </div>
      <div class="status-card">
        <span id="connectionStatus" class="status-badge loading">起動中</span>
        <small id="lastUpdated">最終更新: -</small>
      </div>
    </header>

    <main>
      <section class="summary-grid">
        <article class="summary-card"><span>オフ会名</span><strong id="eventName">-</strong></article>
        <article class="summary-card"><span>開催日</span><strong id="eventDate">-</strong></article>
        <article class="summary-card"><span>会場</span><strong id="venue">-</strong></article>
        <article class="summary-card"><span>予定人数</span><strong id="expectedGuests">-</strong></article>
      </section>

      <section class="nav-grid">
        <button class="nav-card" data-type="preparation"><span>準備物</span><strong id="preparationCount">0件</strong><small>レンタル品・購入品・印刷物</small></button>
        <button class="nav-card" data-type="expense"><span>経費</span><strong id="expenseTotal">¥0</strong><small>会場費・飲食費・備品費</small></button>
        <button class="nav-card" data-type="schedule"><span>スケジュール</span><strong id="scheduleCount">0件</strong><small>受付・開始・片付け</small></button>
        <button class="nav-card" data-type="memo"><span>メモ</span><strong id="memoCount">0件</strong><small>注意事項・連絡事項</small></button>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2 id="panelTitle">ダッシュボード概要</h2>
            <p id="panelDescription">各カテゴリの概要を表示しています。</p>
          </div>
          <div class="panel-actions">
            <button id="createButton" class="primary-button">新規作成</button>
            <button id="reloadButton" class="secondary-button">再読み込み</button>
          </div>
        </div>
        <div id="blockList" class="block-list"></div>
      </section>
    </main>
  </div>

  <div id="editorModal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal></div>
    <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="editorTitle">
      <div class="modal-header">
        <h2 id="editorTitle">ブロック編集</h2>
        <button class="icon-button" type="button" data-close-modal>×</button>
      </div>

      <form id="blockForm" class="editor-form">
        <input type="hidden" id="blockId" />

        <label>カテゴリ
          <select id="blockType">
            <option value="preparation">準備物</option>
            <option value="expense">経費</option>
            <option value="schedule">スケジュール</option>
            <option value="memo">メモ</option>
            <option value="task">タスク</option>
            <option value="link">リンク</option>
            <option value="other">その他</option>
          </select>
        </label>

        <label>タイトル
          <input type="text" id="blockTitle" placeholder="例：レンタル品" required />
        </label>

        <label>内容
          <textarea id="blockContent" rows="8" placeholder="ひとくくりで編集する内容を入力"></textarea>
        </label>

        <div class="form-grid">
          <label>金額
            <input type="number" id="amount" min="0" step="1" />
          </label>
          <label>ステータス
            <input type="text" id="status" placeholder="例：確認中" />
          </label>
        </div>

        <div class="form-grid">
          <label>担当
            <input type="text" id="assignedTo" placeholder="例：Andre" />
          </label>
          <label>並び順
            <input type="number" id="sortOrder" min="0" step="1" />
          </label>
        </div>

        <div class="modal-actions">
          <button type="button" id="deleteButton" class="danger-button">削除</button>
          <div class="modal-actions-right">
            <button type="button" class="secondary-button" data-close-modal>キャンセル</button>
            <button type="submit" class="primary-button">保存</button>
          </div>
        </div>
      </form>
    </section>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
