<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Hub</title>
  <link rel="stylesheet" href="style.css?v=20260702-two-col-1" />
  <link rel="stylesheet" href="mobile-header.css?v=20260702-two-col-1" />
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    .event-create-form{
      display:grid;
      gap:var(--space-3);
    }
    .event-create-form .login-label{
      margin:0;
    }
    .event-create-grid{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:var(--space-3);
    }
    .event-create-message{
      min-height:20px;
      margin:0;
      color:var(--color-danger);
      font-weight:800;
    }
    @media(max-width:840px){
      html,body{max-width:100%;overflow-x:hidden;}
      .app-shell{width:min(100% - 20px,1120px)!important;overflow-x:hidden;}
      .summary-grid,.nav-grid{display:grid!important;grid-template-columns:repeat(2,minmax(0,1fr))!important;gap:12px!important;margin-bottom:20px!important;}
      .summary-card,.nav-card{min-width:0!important;padding:14px!important;}
      .summary-card span,.nav-card span{font-size:11px!important;margin-bottom:6px!important;}
      .summary-card strong,.nav-card strong{font-size:18px!important;line-height:1.25!important;overflow-wrap:anywhere!important;}
      .panel-actions{display:grid!important;grid-template-columns:repeat(3,minmax(0,1fr))!important;width:100%!important;gap:8px!important;}
      .panel-actions button{width:100%!important;min-width:0!important;min-height:40px!important;padding:9px 8px!important;font-size:13px!important;white-space:nowrap!important;}
      .panel,.category-card,.item-group,.item-row,.item-line{max-width:100%!important;overflow-x:hidden!important;}
      .item-row,.item-line{grid-template-columns:1fr!important;}
    }
    @media(max-width:520px){
      .event-create-grid{grid-template-columns:1fr;}
      .summary-grid,.nav-grid{grid-template-columns:repeat(2,minmax(0,1fr))!important;}
    }
  </style>
</head>
<body>
  <section id="loginView" class="login-view">
    <div class="login-card">
      <p class="eyebrow">Event Hub</p>
      <h1>管理画面ログイン</h1>
      <p class="login-lead">管理番号またはイベントコードを入力してください。</p>
      <label class="login-label">管理番号 / イベントコード
        <input id="loginCodeInput" type="text" placeholder="例：1 / SHINJUKU" autocomplete="off" />
      </label>
      <button id="loginButton" class="primary-button">ログイン</button>
      <button id="createEventButton" class="secondary-button" type="button">＋ 新規イベント作成</button>
      <p id="loginError" class="login-error"></p>
    </div>
  </section>

  <div id="appView" class="app-shell is-hidden">
    <header class="app-header">
      <div>
        <p class="eyebrow">LINE LIFF Event Management</p>
        <h1>Event Hub</h1>
      </div>
      <div class="status-card">
        <span id="connectionStatus" class="status-badge loading">起動中</span>
        <small id="lastUpdated">最終更新: -</small>
        <div class="login-user">
          <strong id="currentEventName">-</strong>
          <button id="logoutButton" class="mini-button" type="button">ログアウト</button>
        </div>
      </div>
    </header>

    <main>
      <section class="summary-grid">
        <article class="summary-card"><span>イベント名</span><strong id="eventName">-</strong></article>
        <article class="summary-card"><span>開催日</span><strong id="eventDate">-</strong></article>
        <article class="summary-card"><span>会場</span><strong id="venue">-</strong></article>
        <article class="summary-card"><span>予定人数</span><strong id="expectedGuests">-</strong></article>
      </section>

      <section class="nav-grid">
        <button class="nav-card" data-type="preparation"><span>準備物</span><strong id="preparationCount">0件</strong></button>
        <button class="nav-card" data-type="expense"><span>経費</span><strong id="expenseTotal">¥0</strong></button>
        <button class="nav-card" data-type="schedule"><span>スケジュール</span><strong id="scheduleCount">0件</strong></button>
        <button class="nav-card" data-type="memo"><span>メモ</span><strong id="memoCount">0件</strong></button>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <h2 id="panelTitle">準備物</h2>
            <p id="panelDescription"></p>
          </div>
          <div class="panel-actions">
            <button id="editCurrentButton" class="primary-button">編集</button>
            <button id="deleteCurrentButton" class="danger-button">削除</button>
            <button id="reloadButton" class="secondary-button">再読み込み</button>
          </div>
        </div>
        <div id="blockList" class="block-list"></div>
      </section>
    </main>
  </div>

  <div id="eventCreateModal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close-event-create></div>
    <section class="modal-panel">
      <div class="modal-header">
        <div>
          <h2>新規イベント作成</h2>
          <p>すべての項目を入力してください。ログインIDは自動で採番されます。</p>
        </div>
        <button class="icon-button" type="button" data-close-event-create>×</button>
      </div>
      <div class="event-create-form">
        <label class="login-label">イベント名
          <input id="newEventNameInput" type="text" placeholder="例：新宿オフ会 No.3" autocomplete="off" required />
        </label>
        <div class="event-create-grid">
          <label class="login-label">開催日
            <input id="newEventDateInput" type="date" required />
          </label>
          <label class="login-label">予定人数
            <input id="newExpectedGuestsInput" type="number" min="1" inputmode="numeric" placeholder="例：70" required />
          </label>
        </div>
        <label class="login-label">会場
          <input id="newVenueInput" type="text" placeholder="例：グレイドパーク新宿駅前" autocomplete="off" required />
        </label>
        <p id="eventCreateMessage" class="event-create-message"></p>
      </div>
      <div class="modal-actions">
        <button class="secondary-button" type="button" data-close-event-create>キャンセル</button>
        <button id="confirmCreateEventButton" class="primary-button" type="button">作成する</button>
      </div>
    </section>
  </div>

  <div id="batchModal" class="modal" aria-hidden="true">
    <div class="modal-backdrop" data-close-modal></div>
    <section class="modal-panel">
      <div class="modal-header">
        <div>
          <h2 id="modalTitle">編集</h2>
          <p id="modalDescription">更新ボタンを押すまで保存されません。</p>
        </div>
        <button class="icon-button" type="button" data-close-modal>×</button>
      </div>
      <div id="modeSwitch" class="mode-switch"></div>
      <div id="batchRows" class="batch-rows"></div>
      <div class="batch-footer">
        <button id="addRowButton" class="secondary-button" type="button">行を追加</button>
        <button id="addGroupButton" class="secondary-button" type="button">カテゴリ追加</button>
        <strong id="batchTotal"></strong>
      </div>
      <div class="modal-actions">
        <button class="secondary-button" type="button" data-close-modal>キャンセル</button>
        <button id="saveCategoryButton" class="primary-button" type="button">更新</button>
      </div>
    </section>
  </div>

  <script>
    function updateDraftTotal() {
      const total = document.getElementById('batchTotal');
      if (total) total.textContent = '';
    }
  </script>
  <script src="config.js?v=20260701-ui-renewal-1"></script>
  <script src="app.js?v=20260701-ui-renewal-1"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const createButton = document.getElementById('createEventButton');
      const confirmButton = document.getElementById('confirmCreateEventButton');
      const eventModal = document.getElementById('eventCreateModal');
      const eventNameInput = document.getElementById('newEventNameInput');
      const eventDateInput = document.getElementById('newEventDateInput');
      const venueInput = document.getElementById('newVenueInput');
      const expectedGuestsInput = document.getElementById('newExpectedGuestsInput');
      const eventMessage = document.getElementById('eventCreateMessage');
      const loginInput = document.getElementById('loginCodeInput');
      const loginButton = document.getElementById('loginButton');
      const loginError = document.getElementById('loginError');

      function showEventCreateError(message, targetInput) {
        if (eventMessage) eventMessage.textContent = message;
        if (targetInput) targetInput.focus();
      }

      function openEventCreateModal() {
        if (eventMessage) eventMessage.textContent = '';
        if (eventNameInput) eventNameInput.value = '';
        if (eventDateInput) eventDateInput.value = '';
        if (venueInput) venueInput.value = '';
        if (expectedGuestsInput) expectedGuestsInput.value = '';
        eventModal.classList.add('is-open');
        eventModal.setAttribute('aria-hidden', 'false');
        setTimeout(function () {
          if (eventNameInput) eventNameInput.focus();
        }, 0);
      }

      function closeEventCreateModal() {
        eventModal.classList.remove('is-open');
        eventModal.setAttribute('aria-hidden', 'true');
      }

      async function createEventFromModal() {
        if (typeof CONFIG === 'undefined' || !CONFIG.GAS_WEB_APP_URL) {
          showEventCreateError('config.jsにGAS_WEB_APP_URLが設定されていません。', null);
          return;
        }

        const eventName = eventNameInput ? eventNameInput.value.trim() : '';
        const eventDate = eventDateInput ? eventDateInput.value.trim() : '';
        const venue = venueInput ? venueInput.value.trim() : '';
        const expectedGuests = expectedGuestsInput ? expectedGuestsInput.value.trim() : '';

        if (!eventName) {
          showEventCreateError('イベント名を入力してください。', eventNameInput);
          return;
        }
        if (!eventDate) {
          showEventCreateError('開催日を入力してください。', eventDateInput);
          return;
        }
        if (!expectedGuests || Number(expectedGuests) <= 0) {
          showEventCreateError('予定人数を1以上で入力してください。', expectedGuestsInput);
          return;
        }
        if (!venue) {
          showEventCreateError('会場を入力してください。', venueInput);
          return;
        }

        confirmButton.disabled = true;
        confirmButton.textContent = '作成中...';
        if (eventMessage) eventMessage.textContent = '';
        if (loginError) loginError.textContent = '';

        try {
          const url = new URL(CONFIG.GAS_WEB_APP_URL);
          url.searchParams.set('action', 'createEventAuto');
          url.searchParams.set('eventName', eventName);
          url.searchParams.set('eventDate', eventDate);
          url.searchParams.set('venue', venue);
          url.searchParams.set('expectedGuests', expectedGuests);
          const response = await fetch(url.toString());
          const data = await response.json();

          if (!data.success) throw new Error(data.message || 'イベント作成に失敗しました。');

          closeEventCreateModal();
          alert('イベントを作成しました。\n\nイベント名：' + data.eventName + '\nログインIDは ' + data.code + ' です。');

          if (loginInput) loginInput.value = data.code;
          if (loginButton) loginButton.click();
        } catch (error) {
          console.error(error);
          if (eventMessage) eventMessage.textContent = error.message || 'イベント作成に失敗しました。';
        } finally {
          confirmButton.disabled = false;
          confirmButton.textContent = '作成する';
        }
      }

      if (createButton) createButton.addEventListener('click', openEventCreateModal);
      if (confirmButton) confirmButton.addEventListener('click', createEventFromModal);
      document.querySelectorAll('[data-close-event-create]').forEach(function (el) {
        el.addEventListener('click', closeEventCreateModal);
      });
    });
  </script>
</body>
</html>
